function t(key) {
    const lang = state.language || 'de';
    return (translations[lang] && translations[lang][key]) ? translations[lang][key] : (translations.de[key] || key);
}

        if (nav.startsWith('ta')) state.language = 'ta';
        else if (nav.startsWith('en')) state.language = 'en';
        else state.language = 'de';
    }
} catch(e) {}

function checkFirstTimeGuide() {
    try {
        const isAdmin = state.user?.role === 'admin';
        const key = isAdmin ? 'csk_seen_admin' : 'csk_seen_customer';
        const seen = localStorage.getItem(key);
        if (!seen) {
            state.isGuideOpen = true;
            state.guideMode = isAdmin ? 'admin' : 'customer';
        }
    } catch(e) {}
}

onAuthStateChanged(auth, (user) => {
            if (user) {
                const role = user.email === ADMIN_EMAIL ? 'admin' : 'customer';
                state.user = { email: user.email, uid: user.uid, role: role };
                setupOrderListener();
            } else {
                state.user = null;
                state.orders = [];
                if (unsubscribeOrders) { unsubscribeOrders(); unsubscribeOrders = null; }
                if (state.currentView === 'admin' || state.currentView === 'my-orders') state.currentView = 'menu';
            }
            render();
        });

        async function fetchMenuItems() {
            state.loading = true;
            render();
            try {
                const querySnapshot = await getDocs(collection(db, "menu"));
                state.menuItems = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (error) {
                console.error("Fehler beim Laden der Menüs:", error);
            }
            state.loading = false;
            render();
        }
        fetchMenuItems();

        function setupOrderListener() {
            if (unsubscribeOrders) { unsubscribeOrders(); }
            if (!state.user) return;
            const ordersRef = collection(db, "orders");
            const q = state.user.role === 'admin' ? query(ordersRef) : query(ordersRef, where("userId", "==", state.user.uid));

            unsubscribeOrders = onSnapshot(q, (snapshot) => {
                const fetchedOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                fetchedOrders.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

                if (!isInitialOrderLoad && state.user.role === 'admin') {
                    const newOrdersCount = fetchedOrders.filter(o => o.status === 'neu').length;
                    const oldOrdersCount = state.orders.filter(o => o.status === 'neu').length;
                    if (newOrdersCount > oldOrdersCount) {
                        showToast("🔔 NEUE BESTELLUNG!", "success");
                        try { new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); } catch(e){}
                    }
                }

                state.orders = fetchedOrders;
                isInitialOrderLoad = false;
                render(); 
            });
        }

        function showToast(message, type = 'success') {
            // message can be plain text

            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            toast.className = `${color} text-white px-6 py-3 rounded-lg shadow-xl font-bold toast-enter flex items-center gap-2`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-bell' : 'fa-triangle-exclamation'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

function showToastT(key, type = 'success') {

        function compressImageToBase64(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > 800) { height = Math.round((height * 800) / width); width = 800; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        }

            }
        }

    `;
}


        function renderCheckout() {
            if (state.cart.length === 0) { state.currentView = 'menu'; return renderMenu(); }
            const total = calculateCartTotal();
            
            return `
                <div class="max-w-4xl mx-auto px-4 py-6 md:py-10">
                    <h1 class="text-2xl md:text-3xl font-serif font-bold text-gray-800 mb-6 md:mb-8 border-b pb-4">${t('checkout_title')}</h1>
                    
                    ${!state.user ? `
                        <div class="bg-orange-50 border border-orange-200 p-4 md:p-5 rounded-2xl mb-6 md:mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div><p class="font-bold text-orange-800">Noch nicht eingeloggt?</p><p class="text-sm text-orange-700">Logge dich ein, um diese Bestellung zu speichern.</p></div>
                            <button data-action="nav-login" class="bg-orange-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow w-full sm:w-auto">Einloggen</button>
                        </div>
                    ` : ''}

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                        <div class="lg:col-span-2 order-2 lg:order-1">
                            <form id="checkoutForm" class="bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-gray-100 space-y-6">
                                <h3 class="text-xl font-bold border-b border-gray-100 pb-3">Abholung</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label class="block text-xs font-bold uppercase tracking-wide text-gray-500 mb-1.5">Name / Vorname *</label><input type="text" id="coName" required class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500"></div>
                                    <div><label class="block text-xs font-bold uppercase tracking-wide text-gray-500 mb-1.5">Telefonnummer *</label><input type="tel" id="coPhone" required class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500"></div>
                                </div>
                                <div><label class="block text-xs font-bold uppercase tracking-wide text-gray-500 mb-1.5">Gewünschte Abholzeit *</label><input type="time" id="coTime" required class="w-full md:w-1/2 p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-500 text-lg font-bold"></div>

                                <h3 class="text-xl font-bold border-b border-gray-100 pb-3 mt-8">Zahlungsmethode</h3>
                                <div class="space-y-3">
                                    <label class="flex items-center p-4 md:p-5 border border-gray-200 rounded-2xl cursor-pointer transition ${state.checkoutData.paymentMethod === 'twint' ? 'border-orange-500 bg-orange-50 shadow-sm' : 'hover:bg-gray-50'}">
                                        <input type="radio" name="payment" value="twint" ${state.checkoutData.paymentMethod === 'twint' ? 'checked' : ''} class="w-5 h-5 text-orange-600 focus:ring-orange-500">
                                        <span class="ml-4 font-bold text-lg flex-1 flex items-center justify-between">TWINT <span class="bg-black text-white px-2 py-0.5 rounded text-xs">TWINT</span></span>
                                    </label>
                                    ${state.checkoutData.paymentMethod === 'twint' ? `<div class="ml-4 md:ml-9 p-3.5 bg-blue-50 text-blue-800 text-sm rounded-xl border border-blue-100"><i class="fa-solid fa-mobile-screen mr-1"></i> Überweise <strong>CHF ${total.toFixed(2)}</strong> an die Nummer <strong>076 321 23 92</strong>.</div>` : ''}

                                    <label class="flex items-center p-4 md:p-5 border border-gray-200 rounded-2xl cursor-pointer transition ${state.checkoutData.paymentMethod === 'cash' ? 'border-orange-500 bg-orange-50 shadow-sm' : 'hover:bg-gray-50'}">
                                        <input type="radio" name="payment" value="cash" ${state.checkoutData.paymentMethod === 'cash' ? 'checked' : ''} class="w-5 h-5 text-orange-600 focus:ring-orange-500">
                                        <span class="ml-4 font-bold text-lg flex-1 flex items-center justify-between">Barzahlung <i class="fa-solid fa-coins text-gray-400"></i></span>
                                    </label>
                                </div>
                                <div class="pt-6 mt-6 border-t border-gray-100">
                                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-4.5 rounded-2xl hover:bg-green-700 shadow-xl text-lg flex justify-center items-center gap-2 p-4 transition-transform active:scale-95"><i class="fa-solid fa-check"></i> Kostenpflichtig bestellen (CHF ${total.toFixed(2)})</button>
                                </div>
                            </form>
                        </div>
                        <div class="lg:col-span-1 order-1 lg:order-2">
                            <div class="bg-gray-100 p-6 rounded-3xl sticky top-24 border border-gray-200">
                                <h3 class="font-bold mb-4 border-b border-gray-200 pb-3">Deine Bestellung</h3>
                                <div class="space-y-3 mb-6 text-sm">
                                    ${state.cart.map(item => `<div class="flex justify-between items-start gap-2"><span class="text-gray-600 leading-tight"><span class="font-bold text-gray-800">${item.quantity}x</span> ${item.name}</span><span class="font-medium whitespace-nowrap">CHF ${(item.price * item.quantity).toFixed(2)}</span></div>`).join('')}
                                </div>
                                <div class="border-t border-gray-300 pt-4 flex justify-between font-bold text-xl"><span>Total</span><span class="text-red-600">CHF ${total.toFixed(2)}</span></div>
                                <button data-action="toggle-cart" class="w-full mt-6 py-3 border border-gray-300 rounded-xl text-sm bg-white font-bold hover:bg-gray-50 transition shadow-sm">Warenkorb bearbeiten</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSuccess() {
            return `
                <div class="max-w-xl mx-auto px-4 py-16 md:py-24 text-center">
                    <div class="w-20 h-20 md:w-24 md:h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl md:text-4xl shadow-inner"><i class="fa-solid fa-check"></i></div>
                    <h1 class="text-3xl md:text-4xl font-serif font-bold text-gray-800 mb-4">${t('thank_you')}</h1>
                    <p class="text-gray-600 text-base md:text-lg mb-8">${t('order_success')}</p>
                    ${state.user ? `<button data-action="nav-my-orders" class="bg-orange-500 text-white px-8 py-3.5 rounded-full font-bold shadow-lg mb-4 block w-full hover:bg-orange-600 transition">Bestellstatus ansehen</button>` : ''}
                    <button data-action="nav-menu" class="text-gray-500 font-bold hover:text-gray-800 underline p-2">${t('back_to_menu')}</button>
                </div>
            `;
        }

        function renderFooter() {
            return `
                <footer class="bg-gray-900 text-gray-300 py-10 md:py-12 border-t-4 border-red-600 pb-safe">
                    <div class="max-w-6xl mx-auto px-4 text-center">
                        <h4 class="text-white text-2xl font-bold mb-1 font-cursive text-red-500">Ceylon</h4>
                        <h4 class="text-white text-base md:text-lg font-bold mb-4 font-serif uppercase tracking-widest">Spicy Kitchen</h4>
                        <p class="text-xs md:text-sm text-gray-500"><i class="fa-solid fa-phone text-orange-500"></i> 076 321 23 92 | Switzerland</p>
                    </div>
                </footer>
            `;
        }

        // --- 6. EVENT LISTENER ---
        function attachEventListeners() {

// Language Switcher
document.querySelectorAll('[data-action="change-language"]').forEach(sel => {
    sel.addEventListener('change', (e) => {
        state.language = e.target.value;
                    try { localStorage.setItem('csk_lang', state.language); } catch(e) {}
                    showToastT('toast_lang','success');
                    render();
    });
});

            document.querySelectorAll('[data-action]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const action = btn.getAttribute('data-action');
                    
                    if (action === 'nav-menu') { state.currentView = 'menu'; state.isCartOpen = false; render(); window.scrollTo(0,0); }
                    if (action === 'nav-login') { state.currentView = 'login'; state.isCartOpen = false; render(); window.scrollTo(0,0); }
                    if (action === 'nav-admin') { state.currentView = 'admin'; state.isCartOpen = false; render(); window.scrollTo(0,0); }
                    if (action === 'nav-my-orders') { state.currentView = 'my-orders'; state.isCartOpen = false; render(); window.scrollTo(0,0); }
                    if (action === 'logout') { await signOut(auth); showToastT('toast_logout_ok','success'); }
                    if (action === 'toggle-auth-mode') { state.authMode = state.authMode === 'login' ? 'register' : 'login'; render(); }

// Help / Onboarding
if (action === 'open-guide') { 
    state.isGuideOpen = true; 
    state.guideMode = state.user?.role === 'admin' ? 'admin' : 'customer';
    render(); 
}
if (action === 'close-guide') { state.isGuideOpen = false; render(); }
if (action === 'guide-no-again') {
    try {
        const key = state.user?.role === 'admin' ? 'csk_seen_admin' : 'csk_seen_customer';
        localStorage.setItem(key, '1');
    } catch(e) {}
    state.isGuideOpen = false;
    render();
}
                    
                    // PWA Install Prompt
                    if (action === 'install-app') {
                        if (state.deferredPrompt) {
                            state.deferredPrompt.prompt();
                            const { outcome } = await state.deferredPrompt.userChoice;
                            if (outcome === 'accepted') { state.deferredPrompt = null; state.isInstallable = false; render(); }
                        }
                    }

                    if (action === 'admin-tab-orders') { state.adminTab = 'orders'; render(); }
                    if (action === 'admin-tab-menu') { state.adminTab = 'menu'; render(); }
                    
                    if (action === 'view-item') {
                        state.selectedItem = state.menuItems.find(i => i.id === btn.getAttribute('data-id'));
                        state.selectedQuantity = 1;
                        render();
                    }
                    if (action === 'close-modal') { state.selectedItem = null; render(); }
                    if (action === 'toggle-cart') { state.isCartOpen = !state.isCartOpen; render(); }
                    if (action === 'go-checkout') { state.currentView = 'checkout'; state.isCartOpen = false; render(); window.scrollTo(0,0); }
                    if (action === 'modal-qty-plus') { state.selectedQuantity++; render(); }
                    if (action === 'modal-qty-minus') { if (state.selectedQuantity > 1) state.selectedQuantity--; render(); }
                    if (action === 'add-to-cart') {
                        const existing = state.cart.find(i => i.id === state.selectedItem.id);
                        if (existing) existing.quantity += state.selectedQuantity;
                        else state.cart.push({ ...state.selectedItem, quantity: state.selectedQuantity });
                        state.selectedItem = null; state.isCartOpen = true; 
                        showToastT('toast_added_cart','success');
                        render();
                    }
                    if (action === 'cart-plus') { state.cart[btn.getAttribute('data-index')].quantity++; render(); }
                    if (action === 'cart-minus') {
                        const idx = btn.getAttribute('data-index');
                        if (state.cart[idx].quantity > 1) state.cart[idx].quantity--;
                        else state.cart.splice(idx, 1);
                        if (state.cart.length === 0 && state.currentView === 'checkout') state.currentView = 'menu';
                        render();
                    }
                    if (action === 'cart-remove') {
                        state.cart.splice(btn.getAttribute('data-index'), 1);
                        if (state.cart.length === 0 && state.currentView === 'checkout') state.currentView = 'menu';
                        render();
                    }

                    if (action === 'new-item') { state.editingItem = null; state.form = { name: '', description: '', price: '', imageBase64: '' }; render(); }
                    if (action === 'cancel-edit') { state.editingItem = null; state.form = { name: '', description: '', price: '', imageBase64: '' }; render(); }
                    if (action === 'edit') {
                        const item = state.menuItems.find(i => i.id === btn.getAttribute('data-id'));
                        if (item) { state.editingItem = item; state.form = { ...item }; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
                    }
                    if (action === 'delete') {
                        if (confirm('Wirklich löschen?')) {
                            try { 
                                const id = btn.getAttribute('data-id');
                                await deleteDoc(doc(db, "menu", id)); 
                                state.menuItems = state.menuItems.filter(i => i.id !== id); 
                                showToastT('toast_deleted','success'); render(); 
                            } catch (err) { alert("Fehler: " + err.message); }
                        }
                    }

                    if (action === 'update-status') {
                        const orderId = btn.getAttribute('data-id');
                        const newStatus = btn.getAttribute('data-status');
                        try {
                            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                            await updateDoc(doc(db, "orders", orderId), { status: newStatus });
                            showToastT('toast_status','success');
                        } catch (err) { alert("Fehler beim Update: " + err.message); }
                    }
                });
            });

            document.querySelectorAll('input[name="payment"]').forEach(radio => {
                radio.addEventListener('change', (e) => { state.checkoutData.paymentMethod = e.target.value; render(); });
            });

            const authForm = document.getElementById('authForm');
            if (authForm) {
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('authEmail').value;
                    const pass = document.getElementById('authPassword').value;
                    const btn = authForm.querySelector('button');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Bitte warten...';
                    
                    try {
                        if (state.authMode === 'login') {
                            await signInWithEmailAndPassword(auth, email, pass);
                            showToastT('toast_login_ok','success');
                        } else {
                            await createUserWithEmailAndPassword(auth, email, pass);
                            showToastT('toast_register_ok','success');
                        }
                    } catch (err) { 
                        alert("Fehler: " + (err.code === 'auth/email-already-in-use' ? 'E-Mail wird bereits verwendet.' : 'Zugangsdaten prüfen.')); 
                        render();
                    }
                });
            }

            const checkoutForm = document.getElementById('checkoutForm');
            if (checkoutForm) {
                checkoutForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = checkoutForm.querySelector('button[type="submit"]');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verarbeite...';
                    btn.disabled = true;

                    state.checkoutData.name = document.getElementById('coName').value;
                    state.checkoutData.phone = document.getElementById('coPhone').value;
                    state.checkoutData.pickupTime = document.getElementById('coTime').value;

                    const orderObj = {
                        userId: state.user ? state.user.uid : null,
                        customer: state.checkoutData,
                        items: state.cart,
                        totalAmount: calculateCartTotal(),
                        status: 'neu',
                        createdAt: serverTimestamp()
                    };

                    try {
                        await addDoc(collection(db, "orders"), orderObj);
                        state.cart = []; state.currentView = 'success'; window.scrollTo(0, 0); showToastT('toast_order_sent','success'); render();
                    } catch (err) {
                        alert("Fehler bei der Bestellung. Bitte Sicherheitsregeln in Firebase prüfen.");
                        render();
                    }
                });
            }

            const adminForm = document.getElementById('adminForm');
            if (adminForm) {
                document.getElementById('formImageInput').addEventListener('change', (e) => {
                    if (e.target.files[0]) compressImageToBase64(e.target.files[0], (base64) => { state.form.imageBase64 = base64; render(); });
                });
                adminForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const itemData = {
                        name: document.getElementById('formName').value,
                        description: document.getElementById('formDesc').value,
                        price: parseFloat(document.getElementById('formPrice').value),
                        imageBase64: state.form.imageBase64
                    };
                    try {
                        if (state.editingItem) {
                            await updateDoc(doc(db, "menu", state.editingItem.id), itemData);
                            const idx = state.menuItems.findIndex(i => i.id === state.editingItem.id);
                            state.menuItems[idx] = { id: state.editingItem.id, ...itemData };
                        } else {
                            const docRef = await addDoc(collection(db, "menu"), itemData);
                            state.menuItems.push({ id: docRef.id, ...itemData });
                        }
                        state.editingItem = null; state.form = { name: '', description: '', price: '', imageBase64: '' };
                        showToastT('toast_saved','success'); render();
                    } catch (err) { alert("Fehler beim Speichern."); }
                });
            }
        }
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>
